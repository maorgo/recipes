{% extends "base.html" %}

{% block title %}כניסה לניהול – מתכונים{% endblock %}

{% block content %}
  <div class="row justify-content-center">
    <div class="col-md-4">
      <div class="card shadow-sm">
        <div class="card-header text-center fw-bold">כניסה לפאנל ניהול</div>
        <div class="card-body">
          <form method="post">
            <div class="mb-3">
              <label class="form-label" for="username">שם משתמש</label>
              <input type="text" class="form-control" id="username" name="username" required />
            </div>
            <div class="mb-3">
              <label class="form-label" for="password">סיסמה</label>
              <input type="password" class="form-control" id="password" name="password" required />
            </div>
            <button type="submit" class="btn btn-primary w-100">כניסה</button>
          </form>
        </div>
      </div>
    </div>
  </div>
{% endblock %}
